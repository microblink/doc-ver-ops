auth:
  license:
    # -- name of license-key secret
    secretName: "license-key"
    # -- enable if you want to create license secret as part of this charts deployment
    createSecret: false
    # -- if createSecret is set to true, set the license key here
    licenseKey: ""
    # -- App identifier from microblink developer hub
    applicationId: ""

docVer:
  # -- enable single-image deployment (API + Worker + Models in one container)
  enabled: true
  # -- number of replicas to run
  replicaCount: 1
  # -- if set, overrides app.kubernetes.io/name
  nameOverride: "doc-ver"
  # -- if set, overrides deployment, hpa, ingress, and service metadata.name
  fullnameOverride: ""
  image:
    # -- deployment docker image repository
    repository: us-docker.pkg.dev/document-verification-public/verify-public/single-image
    # -- deployment docker image pull policy
    pullPolicy: IfNotPresent
    # -- deployment docker image tag, if not set, version will be used as tag
    tag: "3.21.1"
    # -- deployment docker image pull secrets
    pullSecrets: []
  service:
    # -- service type
    type: ClusterIP
    # -- service and container port
    port: 8080
  serviceAccount:
    # -- create a service account
    create: true
    # -- if set, overrides the name of the service account
    name: ""
    # -- annotations for the service account
    annotations: {}
  resources:
    limits:
      # -- deployment resource cpu limit
      cpu: "4"
      # -- deployment resource memory limit
      memory: 8Gi
    requests:
      # -- deployment resource cpu requests
      cpu: "2"
      # -- deployment resource memory requests
      memory: 4Gi
  ingress:
    # -- enable if you want to expose the service
    enabled: false
    className: ""
    annotations: {}
    tls: []
    hosts:
      # -- if you want to expose the service, set the host name
      - host: "docver.microblink.com"
        paths: ["/docver/", "/api/"]
    pathType: ImplementationSpecific
  env:
    # -- worker pool size
    WORKER_COUNT: "2"
    # -- base port for worker health servers
    HEALTH_PORT_BASE: "18080"
    # -- API / queue configuration
    API_TIMEOUT_SECONDS: "30"
    WorkerPollTimeoutSeconds: "10"
    JobTimeoutMinutes: "2"
    # -- TF Serving endpoint inside the container
    MPROXY_MODELS_ENDPOINT: "localhost:8500"
    MPROXY_MODELS_ENDPOINT_SSL: "OFF"
  logFiles:
    # -- enable writing log files to /var/log (stdout/stderr is always enabled)
    enabled: false
  # -- additional env vars (name/value pairs)
  extraEnv: []
  # -- list of secret names to be added to deployment environment
  extraSecrets: []
  probes:
    liveness:
      path: /health/live
      initialDelaySeconds: 60
      periodSeconds: 30
      timeoutSeconds: 5
      failureThreshold: 5
    readiness:
      path: /health/ready
      initialDelaySeconds: 30
      periodSeconds: 15
      timeoutSeconds: 5
      failureThreshold: 10
    startup:
      enabled: true
      path: /health/ready
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 60
  # -- graceful shutdown timeout
  terminationGracePeriodSeconds: 30
  # -- deployment node selector
  nodeSelector: {}
  # -- deployment tolerations
  tolerations: []
  # -- deployment podAnnotations
  podAnnotations: {}
  # -- deployment affinity
  affinity: {}
  # -- deployment topologySpreadConstraints
  topologySpreadConstraints: []
  # -- pod security context
  podSecurityContext: {}
  # -- container security context
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 65534
    seccompProfile:
      type: RuntimeDefault
  volumes:
    # -- size limits for writable emptyDir volumes (optional, e.g. "1Gi")
    tmp:
      sizeLimit: ""
    varTmp:
      sizeLimit: ""
    varLog:
      sizeLimit: ""