{{- if .Values.singleImage.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "docver.serviceAccountName" . }}
  labels:
    {{- include "docver.labels" . | nindent 4 }}
  {{- with .Values.singleImage.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
