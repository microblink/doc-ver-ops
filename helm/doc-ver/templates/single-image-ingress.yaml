{{- if and .Values.docVer.enabled .Values.docVer.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "docver.fullname" . }}
  labels:
    {{- include "docver.labels" . | nindent 4 }}
  {{- with .Values.docVer.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.docVer.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- with .Values.docVer.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.docVer.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ . }}
            pathType: {{ $.Values.docVer.ingress.pathType }}
            backend:
              service:
                name: {{ include "docver.fullname" $ }}
                port:
                  number: {{ $.Values.docVer.service.port }}
          {{- end }}
    {{- end }}
{{- end }}
