{{ if .Values.auth.license.createSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.auth.license.secretName }}
  labels:
    chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    release: {{ .Release.Name }}
stringData:
  LICENSE_KEY: {{ .Values.auth.license.licenseKey | required "if auth.license.createSecret is set, auth.license.licenseKey value must be provided" }}
  LICENSE_APPLICATION_ID: {{ .Values.auth.license.applicationId | required "if auth.license.createSecret is set, auth.license.applicationId value must be provided" }}
type: Opaque
{{ end }}
